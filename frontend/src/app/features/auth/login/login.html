<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🍿</div>
      <h1>Bienvenido de vuelta</h1>
      <p>Inicia sesión en tu cuenta</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="tu@email.com" />
        @if (form.get('email')?.invalid && form.get('email')?.touched) {
          <span class="field-error">Email inválido</span>
        }
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="••••••" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field-error">Mínimo 6 caracteres</span>
        }
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿No tienes cuenta? <a routerLink="/auth/register">Regístrate</a>
    </p>
  </div>
</div>
