<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🍿</div>
      <h1>Crear cuenta</h1>
      <p>Únete a Snacktopia hoy</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" formControlName="nombre" placeholder="Tu nombre" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="tu@email.com" />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres" />
      </div>
      <div class="form-group">
        <label>Preferencia de snacks</label>
        <select formControlName="preferencia">
          <option value="DULCE">🍬 Dulce</option>
          <option value="SALADO">🧂 Salado</option>
          <option value="MIXTO">🎯 Mixto</option>
        </select>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Creando cuenta...' : 'Registrarse' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta? <a routerLink="/auth/login">Inicia sesión</a>
    </p>
  </div>
</div>
